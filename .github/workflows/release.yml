---
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: artifacts/*

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: artifacts/*

  publish:
    runs-on: ubuntu-24.04
    needs: [build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos
          path: macos/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux
          path: linux/

      - name: Generate release body
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --latest \
            macos/*.dmg \
            linux/*.deb \
            linux/*.AppImage

